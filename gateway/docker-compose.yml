version: '3.8'

services:
  backend:
    build: ./backend
    network_mode: host
    volumes:
      - ./backend/config:/app/backend/config
    environment:
      - TZ=Europe/Warsaw

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - TZ=Europe/Warsaw
