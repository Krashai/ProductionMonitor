version: '3.8'

services:
  # --- PLC GATEWAY SERVICES ---
  gateway-backend:
    build: ./gateway/backend
    container_name: pm-gateway-backend
    ports:
      - "8000:8000"
    volumes:
      - ./gateway/backend/config:/app/config
      - ./gateway/backend/app:/app/app
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - DATABASE_URL=postgresql://user:password@dashboard-db:5432/line_gantt
      - TZ=Europe/Warsaw
      - NOTIFY_TOKEN=${NOTIFY_TOKEN:-change-me-in-production}
    depends_on:
      dashboard-db-init:
        condition: service_completed_successfully
    networks:
      - prod_net
    restart: always

  gateway-frontend:
    build: ./gateway/frontend
    container_name: pm-gateway-frontend
    ports:
      - "3000:80"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - TZ=Europe/Warsaw
    networks:
      - prod_net
    depends_on:
      - gateway-backend
    restart: always

  # --- LINE GANTT DASHBOARD SERVICES ---
  dashboard-db:
    image: timescale/timescaledb:latest-pg15
    container_name: pm-dashboard-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: line_gantt
      TS_TUNE: "off"
      TZ: Europe/Warsaw
    ports:
      - "5432:5432"
    volumes:
      - dashboard_pgdata:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - prod_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d line_gantt"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # USŁUGA INICJALIZUJĄCA BAZĘ (Zatrzymuje się po skończeniu)
  dashboard-db-init:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.prod
      target: builder
    container_name: pm-dashboard-db-init
    depends_on:
      dashboard-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://user:password@dashboard-db:5432/line_gantt
    networks:
      - prod_net
    volumes:
      - ./dashboard/init-db.sh:/app/init-db.sh
    entrypoint: ["sh", "/app/init-db.sh"]

  dashboard-app:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.prod
      target: runner
    container_name: pm-dashboard-app
    depends_on:
      dashboard-db-init:
        condition: service_completed_successfully
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@dashboard-db:5432/line_gantt
      - NODE_ENV=production
      - TZ=Europe/Warsaw
      - NOTIFY_TOKEN=${NOTIFY_TOKEN:-change-me-in-production}
    networks:
      - prod_net
    restart: always

networks:
  prod_net:
    driver: bridge

volumes:
  dashboard_pgdata:
