# =============================================================================
#  Reverse proxy: ProductionMonitor — Dashboard (Next.js, panel operatora)
# -----------------------------------------------------------------------------
#  Topologia:
#    Komputer A (reverse proxy):
#      NIC1 = 10.0.0.211    (operatorzy łączą się tu po HTTP)
#      NIC2 = 10.10.0.199   (skąd nginx łączy się do aplikacji)
#    Komputer B (Production Monitor / docker-compose):
#      IP   = 10.10.0.244   (port 3001 → kontener pm-dashboard-app:3000)
#
#  Wystawiany jest TYLKO panel monitoringu (dashboard-app, port 3001).
#  Panel admina PLC (gateway-frontend) NIE jest wystawiony — pozostaje lokalny
#  na hoście produkcyjnym (port 3000), zgodnie z założeniem.
#
#  UWAGA — pułapka inheritance w nginx:
#    Dyrektywy `proxy_set_header` z bloku `server` NIE są dziedziczone do
#    `location`, jeśli ten location ma JAKĄKOLWIEK własną proxy_set_header.
#    Dlatego cała sekcja proxy_set_header jest powtarzana w każdym location —
#    nie redukuj tego do `server { proxy_set_header ... }`, bo backend straci
#    nagłówek `Host` i wszystko, co od niego zależy w Next.js.
#
#  Instalacja na maszynie reverse proxy:
#    sudo cp dashboard.conf /etc/nginx/sites-available/production-monitor.conf
#    sudo ln -sf /etc/nginx/sites-available/production-monitor.conf \
#                /etc/nginx/sites-enabled/production-monitor.conf
#    sudo rm -f /etc/nginx/sites-enabled/default
#    sudo nginx -t && sudo systemctl reload nginx
#
#  Test SSE (musi przyjść "CONNECTED" i co ~25 s ": heartbeat"):
#    curl -N http://10.0.0.211/api/events
# =============================================================================

upstream dashboard_app {
    # Host z docker-compose: 10.10.0.244 (sieć produkcyjna)
    # Port 3001 zgodnie z mapowaniem w docker-compose.yml (dashboard-app:3000 -> 3001)
    server 10.10.0.244:3001;

    # Pula keepalive — szybsze ponowne użycie połączeń TCP do backendu.
    # Wymaga `proxy_http_version 1.1` i `proxy_set_header Connection ""` w location.
    keepalive 16;
}

server {
    # UWAGA: nginx chodzi w kontenerze Docker (network_mode: bridge z port mapping).
    # Wewnątrz kontenera adres 10.0.0.211 nie istnieje (osobny network namespace),
    # więc binduje się do 0.0.0.0:80. Ograniczeniem do NIC1 zajmuje się Docker
    # przez `ports: ["10.0.0.211:80:80"]` w docker-compose.yml — patrz sekcja
    # "Co dodać do docker-compose" w komentarzu na górze.
    listen 80 default_server;
    server_name _;

    # --- Logi ---
    access_log /var/log/nginx/production-monitor.access.log;
    error_log  /var/log/nginx/production-monitor.error.log warn;

    # --- Limity i defaultowe timeouty (dziedziczone w location, chyba że nadpisane) ---
    client_max_body_size  4m;
    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # =========================================================================
    #  SSE: live updates statusów linii produkcyjnych
    # -------------------------------------------------------------------------
    #  /api/events to długie połączenie text/event-stream.
    #  Aplikacja wysyła "data: ..." przy każdej zmianie z PLC oraz komentarz
    #  ": heartbeat" co 25 s (dashboard/src/app/api/events/route.ts:33).
    #
    #  Bez `proxy_buffering off` nginx zatrzyma eventy w buforze i panel
    #  NIGDY nie odświeży się przez router.refresh() w useRealtime.ts.
    # =========================================================================
    location = /api/events {
        proxy_pass http://dashboard_app;
        proxy_http_version 1.1;

        # --- Standardowe nagłówki forwardowane do backendu ---
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Puste Connection => keepalive do upstreamu zachowane.
        proxy_set_header Connection "";

        # --- Krytyczne dla SSE ---
        proxy_buffering off;          # bez tego eventy stoją w buforze nginx
        proxy_cache     off;          # nie cache'ujemy strumienia
        gzip            off;          # gzip buforuje, zabija SSE

        # Strumień ma żyć godzinami; heartbeat aplikacyjny co 25 s
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # =========================================================================
    #  Statyka Next.js — agresywny cache w przeglądarce (hashowane nazwy plików)
    # =========================================================================
    location /_next/static/ {
        proxy_pass http://dashboard_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        # Pliki w /_next/static/ mają nazwy z hashem zawartości,
        # więc można cache'ować rok i oznaczyć jako immutable.
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # =========================================================================
    #  Catch-all: SSR Next.js + REST API (/api/*) + reszta assetów
    # =========================================================================
    location / {
        proxy_pass http://dashboard_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
    }
}
